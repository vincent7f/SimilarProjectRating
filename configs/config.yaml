# Similar Project Rating System - Main Configuration File
# 相似项目评分系统 - 主配置文件
#
# This file contains all configurable parameters for the system.
# Environment variables can be injected using ${VAR_NAME} syntax.
# 此文件包含系统的所有可配置参数。
# 可使用${VAR_NAME}语法注入环境变量。

# ---------------------------------------------------------------------------
# GitHub API Settings / GitHub API设置
# ---------------------------------------------------------------------------
github:
  api_token: ${GITHUB_TOKEN:''}
  rate_limit: 5000
  timeout_seconds: 30
  base_url: "https://api.github.com"
  per_page: 30

# ---------------------------------------------------------------------------
# AI / LLM Provider Settings / AI/LLM提供商设置
# ---------------------------------------------------------------------------
ai:
  provider: "ollama"          # ollama | openai | litellm
  model: "gemma4:26b-a4b-it-q4_K_M"    # Default model name (gemma4:26b-a4b-it-q4_K_M) / 默认模型名
  api_base: "http://localhost:11434"
  api_key: ${AI_API_KEY:''}
  fallback_enabled: true      # Auto-switch provider on failure / 失败时自动切换
  temperature: 0.7            # Creativity control (0.0=deterministic, 2.0=random)
                              # 创造性控制（0.0=确定性，2.0=随机）
  max_tokens: 2048
  request_timeout: 120        # Seconds / 秒
  max_retries: 3

# ---------------------------------------------------------------------------
# Analysis Engine Settings / 分析引擎设置
# ---------------------------------------------------------------------------
analysis:
  max_projects: 20            # Max projects retained after filtering (top-N by stars)
                              # 过滤后保留的最大项目数（按stars取前N）
  min_similarity_score: 0.6   # Relevance threshold (0.0-1.0), below = filtered out
                              # 相关性阈值（0.0-1.0），低于此值的将被过滤
  download_timeout: 300       # Seconds to wait for repo archive download
                              # 等待repo压缩包下载的时间（秒）
  max_code_size_mb: 50        # Skip detailed analysis if archive exceeds size (MB)
                              # 如果压缩包超过此大小则跳过详细分析（MB）
  parallel_analysis: true     # Analyze multiple projects concurrently
                              # 并行分析多个项目
  max_concurrent_analyses: 4  # Max simultaneous project analyses
                              # 同时进行的最大项目分析数
  skip_large_repos: true      # For large repos, analyze only core directories
                              # 对于大型仓库，仅分析核心目录

# ---------------------------------------------------------------------------
# Scoring System Settings / 评分系统设置
# ---------------------------------------------------------------------------
scoring:
  # Dimension weights (must sum to ~1.0) / 维度权重（总和须约等于1.0）
  weights:
    code_quality: 0.25       # Code style, tests, dependencies, documentation
                              # 代码风格、测试、依赖、文档
    community: 0.20          # Star growth, commit frequency, issue resolution
                              # Star增长、提交频率、Issue解决
    functionality: 0.18      # Feature completeness, examples, API coverage
                              # 功能完整性、示例、API覆盖
    maturity: 0.15           # Version history, CI/CD, governance
                              # 版本历史、CI/CD、治理
    reputation: 0.12         # External mentions, tutorials, community trust
                              # 外部提及、教程、社区信任
    sustainability: 0.10     # Maintenance team, roadmap, long-term viability
                              # 维护团队、路线图、长期可行性
  normalization_method: "minmax"  # minmax | zscore

# ---------------------------------------------------------------------------
# Logging Settings / 日志设置
# ---------------------------------------------------------------------------
logging:
  level: "INFO"              # DEBUG | INFO | WARNING | ERROR
  file_path: "./logs"        # Log file storage directory / 日志文件存储目录
  max_size_mb: 100           # Rotation trigger size (MB) / 触发轮转的大小（MB）
  backup_count: 5            # Rotated backups to retain / 保留的轮转备份数
  console_output: true       # Also print to terminal / 也打印到终端
  json_format: true          # Structured JSON log entries / 结构化JSON日志条目
  session_log_prefix: "session_"  # Per-session log filename prefix
                                 # 每次会话日志文件名前缀

# ---------------------------------------------------------------------------
# Output & Report Settings / 输出与报告设置
# ---------------------------------------------------------------------------
output:
  # Markdown export - MANDATORY: all project outputs must be Markdown files
  # Markdown导出 - 强制性：所有项目输出必须是Markdown文件
  results_dir: "./data/results"          # Output directory for Markdown reports / Markdown报告输出目录
  format: "markdown"                     # Output format (always markdown) / 输出格式（始终为markdown）
  bilingual_reports: true                # Include both English and Chinese in reports / 报告中包含英文和中文
  include_json_metadata: true            # Save JSON metadata alongside Markdown / 同时保存JSON元数据
  auto_open: false                       # Automatically open after generation / 生成后自动打开
  report_templates:                      # Report template options / 报告模板选项
    detailed: true                       # Include detailed analysis report / 包含详细分析报告
    summary: true                        # Include executive summary / 包含执行摘要
    comparison: true                     # Include comparison table / 包含比较表
  filename_format: "analysis_{query}_{timestamp}.md"  # Filename pattern / 文件名模式
  archive_old_reports: true              # Compress reports older than 30 days / 压缩超过30天的报告

# ---------------------------------------------------------------------------
# GitReverse Settings / GitReverse设置
# ---------------------------------------------------------------------------
gitreverse:
  base_url: "https://gitreverse.com"
  timeout_seconds: 30
  enabled: true               # Use GitReverse instead of code analysis / 使用GitReverse替代代码分析
  fallback_to_code: true     # Fallback to traditional code analysis if GitReverse fails / GitReverse失败时回退到传统代码分析
  max_retries: 3
  cache_duration_seconds: 3600  # Cache GitReverse prompts / 缓存GitReverse prompt

# ---------------------------------------------------------------------------
# Parallel Execution Settings / 并行执行设置
# ---------------------------------------------------------------------------
parallel:
  # AI-dependent tasks (default: serial execution) / AI依赖任务（默认：串行执行）
  ai_concurrent_limit: 1      # Maximum concurrent AI-dependent tasks / AI依赖任务的最大并发数
  enable_parallel_ai: false   # Disable parallel AI by default / 默认禁用AI并行
  
  # Non-AI tasks (default: 5 parallel tasks) / 非AI任务（默认：5个并行任务）
  non_ai_concurrent_limit: 5  # Maximum concurrent non-AI tasks / 非AI任务的最大并发数
  enable_parallel_non_ai: true # Enable parallel non-AI by default / 默认启用非AI并行
  
  # Timeout and adaptive settings / 超时和自适应设置
  ai_semaphore_timeout: 300   # Seconds to wait for AI resource / 等待AI资源的秒数
  adaptive_scaling: false     # Disable adaptive scaling by default / 默认禁用自适应缩放
  
  # Overall limits / 总体限制
  min_concurrent_tasks: 1    # Minimum concurrent tasks / 最小并发任务数
  max_concurrent_tasks: 10   # Maximum concurrent tasks / 最大并发任务数

# ---------------------------------------------------------------------------
# Cache Settings / 缓存设置
# ---------------------------------------------------------------------------
cache:
  enabled: true
  ttl_seconds: 3600          # Cache entry lifetime in seconds (default: 1 hour)
                              # 缓存条目生命周期（秒）（默认：1小时）
  directory: "./data/cache"  # Cache storage directory / 缓存存储目录
  max_entries: 500           # Maximum cached items / 最大缓存项数

# ---------------------------------------------------------------------------
# Environment Check Settings / 环境检查设置
# ---------------------------------------------------------------------------
environment_check:
  # Execution settings / 执行设置
  enabled: true               # Enable environment checks before pipeline execution
                              # 在执行流水线前启用环境检查
  timeout_seconds: 30         # Timeout for external service checks (GitHub, Ollama, etc.)
                              # 外部服务检查的超时时间（GitHub、Ollama等）
  
  # Check granularity / 检查粒度
  check_python_packages: true # Check required Python packages
                              # 检查必需的Python包
  check_github_api: true      # Check GitHub API connectivity and rate limits
                              # 检查GitHub API连接性和速率限制
  check_ai_providers: true    # Check configured AI provider (Ollama/OpenAI)
                              # 检查配置的AI提供商（Ollama/OpenAI）
  check_gitreverse: true      # Check GitReverse.com connectivity
                              # 检查GitReverse.com连接性
  check_internet: true        # Check basic internet connectivity
                              # 检查基本互联网连接性
  check_file_permissions: true # Check write permissions for output directories
                              # 检查输出目录的写权限
  
  # Strictness settings / 严格性设置
  strict_mode: false          # Treat warnings as failures in strict mode
                              # 在严格模式下将警告视为失败
  require_critical_passed: true # Require all critical checks to pass
                              # 要求所有关键检查通过
  allow_proceed_with_warnings: true # Allow execution with non-critical warnings
                              # 允许在有非关键警告的情况下执行
  
  # Output settings / 输出设置
  detailed_report: false      # Show detailed check report instead of summary
                              # 显示详细的检查报告而非摘要
  save_report_to_file: false  # Save check report to JSON file
                              # 将检查报告保存到JSON文件
  report_file_path: "./logs/environment_check.json"  # Default report file path
                              # 默认报告文件路径
